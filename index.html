<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Learn Languages! 🌍</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFF9F0;
    --primary: #FF6B6B;
    --yes: #51CF66;
    --no: #FF6B6B;
    --card-bg: #FFFFFF;
    --shadow: 0 8px 40px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'Segoe UI', 'Arial Rounded MT Bold', Arial, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    overflow-y: auto;
    touch-action: pan-y;
  }

  /* ─── Header ─── */
  header {
    width: 100%;
    padding: 16px 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: -0.02em;
    padding: 7px 18px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: 0 4px 18px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
    background-clip: padding-box;
  }
  .logo .lingo { color: #FF6B6B; }
  .logo .play  { color: #FFD43B; }

  /* ─── Native language selector ─── */
  .native-select {
    border: 2px solid #E9ECEF;
    border-radius: 14px;
    padding: 5px 8px;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: inherit;
    background: #fff;
    color: #555;
    cursor: pointer;
    outline: none;
    white-space: nowrap;
    max-width: 120px;
    transition: border-color 0.2s;
  }
  .native-select:focus { border-color: #FF6B6B; }

  /* ─── Language selector ─── */
  .lang-strip {
    width: 100%;
    padding: 10px 16px 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    justify-content: flex-start;
  }
  .lang-strip::-webkit-scrollbar { display: none; }
  .lang-pill {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    border: 2px solid #E9ECEF;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    background: #fff;
    color: #666;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .lang-pill:hover { border-color: #FF6B6B; }
  .lang-pill.active { background: #FF6B6B; border-color: #FF6B6B; color: #fff; }

  .category-btn {
    background: #fff;
    border: 2px solid #FFD43B;
    border-radius: 20px;
    padding: 6px 10px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    color: #555;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .category-btn:hover { background: #FFD43B; color: #333; }

  /* ─── Score bar ─── */
  .score-bar {
    display: flex;
    gap: 16px;
    margin: 8px 0 4px;
    font-size: 0.9rem;
    font-weight: 800;
  }
  .score-item { display: flex; align-items: center; gap: 6px; }
  .score-dot { width: 14px; height: 14px; border-radius: 50%; }
  .score-dot.know { background: var(--yes); }
  .score-dot.practice { background: var(--no); }

  /* ─── Category picker ─── */
  .category-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .category-overlay.open { display: flex; }
  .category-box {
    background: #fff;
    border-radius: 24px;
    padding: 28px 24px;
    width: 320px;
    max-width: 90vw;
    box-shadow: var(--shadow);
  }
  .category-box h2 { text-align: center; margin-bottom: 18px; font-size: 1.3rem; }
  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .cat-item {
    border: 2.5px solid #eee;
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-item:hover, .cat-item.active { border-color: var(--primary); background: #FFF0F0; }
  .cat-item .cat-emoji { font-size: 2rem; display: block; margin-bottom: 4px; }
  .cat-item .cat-name { font-weight: 700; font-size: 0.9rem; }

  /* ─── Card stack ─── */
  .deck {
    position: relative;
    width: min(360px, 88vw);
    height: min(420px, 48vh);
    margin: 8px 0 0;
    flex-shrink: 0;
  }

  .card {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border-radius: 28px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s ease-out, box-shadow 0.08s, border-color 0.3s, background 0.3s;
    will-change: transform;
  }

  /* Rainbow border ring — default state */
  @keyframes rainbowSpin {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(360deg); }
  }
  .card.top {
    isolation: isolate;
  }
  /* Default state — plain subtle border */
  .card.top::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 34px;
    padding: 6px;
    background: conic-gradient(from 0deg, #ff0000, #ff8800, #ffff00, #00dd00, #00ccff, #0044ff, #aa00ff, #ff0000);
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: rainbowSpin 4s linear infinite;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  /* Revealed state — rainbow border appears */
  .card.top.revealed::after {
    opacity: 1;
  }

  /* back cards peek effect */
  .card:nth-child(2) { transform: translate(3px, 8px) rotate(1.5deg); z-index: 1; }
  .card:nth-child(3) { transform: translate(-3px, 14px) rotate(-1deg); z-index: 0; }
  .card.top { z-index: 10; }

  .card-emoji {
    font-size: clamp(4rem, 14vw, 6rem);
    line-height: 1;
    display: inline-block;
    transition: transform 0.2s;
  }
  @keyframes emojiPop {
    0%   { transform: scale(1) rotate(0deg); }
    20%  { transform: scale(1.5) rotate(-10deg); }
    40%  { transform: scale(1.6) rotate(10deg); }
    60%  { transform: scale(1.4) rotate(-6deg); }
    75%  { transform: scale(1.5) rotate(4deg); }
    90%  { transform: scale(1.1) rotate(-2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .card.revealed .card-emoji {
    animation: emojiPop 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
  }
  .card-chinese {
    font-size: clamp(3rem, 12vw, 5rem);
    font-weight: 900;
    color: #222;
    line-height: 1;
  }
  .card-pinyin {
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    color: #888;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .card-english {
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    font-weight: 800;
    color: #444;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card.revealed .card-english { opacity: 1; }

  .tap-hint {
    font-size: 1.2rem;
    color: #bbb;
    font-weight: 600;
    border: 2px solid #E9ECEF;
    border-radius: 20px;
    padding: 6px 18px;
    transition: opacity 0.3s;
  }
  .card.revealed .tap-hint { opacity: 0; }

  /* swipe overlays */
  .swipe-label {
    position: absolute;
    top: 28px;
    font-size: 1.5rem;
    font-weight: 900;
    padding: 8px 18px;
    border-radius: 12px;
    border: 4px solid;
    opacity: 0;
    transform: rotate(-15deg);
    transition: opacity 0.1s;
    pointer-events: none;
  }
  .swipe-label.know { right: 24px; color: var(--yes); border-color: var(--yes); transform: rotate(15deg); }
  .swipe-label.practice { left: 24px; color: var(--no); border-color: var(--no); }

  /* ─── Swipe hint arrows ─── */
  .swipe-hints {
    display: flex;
    justify-content: space-between;
    width: min(360px, 88vw);
    margin-top: 44px;
    padding: 0 4px;
    gap: 32px;
  }
  .hint-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.85rem; font-weight: 700;
    padding: 8px 16px;
    border-radius: 20px;
    opacity: 0.75;
  }
  .hint-pill.left { background: #FFE0E0; color: #E03131; }
  .hint-pill.right { background: #D3F9D8; color: #2F9E44; }

  /* ─── Swipe continue hint ─── */
  .swipe-continue {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    color: #bbb;
    margin-top: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .swipe-continue.show { opacity: 1; }

  @keyframes nudgeLeft {
    0%, 100% { transform: translateX(0); }
    40%       { transform: translateX(-6px); }
  }
  @keyframes nudgeRight {
    0%, 100% { transform: translateX(0); }
    40%       { transform: translateX(6px); }
  }
  .swipe-continue .arrow-left  { animation: nudgeLeft  1.2s ease-in-out infinite; }
  .swipe-continue .arrow-right { animation: nudgeRight 1.2s ease-in-out infinite; }

  /* ─── Celebration overlay ─── */
  .celebrate {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 200;
  }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 14px;
    opacity: 0;
    animation: fall 1.4s ease-in forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ─── Done screen ─── */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 16px;
    padding: 32px 20px;
  }
  .done-screen.show { display: flex; }
  .done-emoji { font-size: 5rem; }
  .done-title { font-size: 2rem; font-weight: 900; color: #333; }
  .done-sub { font-size: 1.1rem; color: #888; }
  .restart-btn {
    margin-top: 8px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 24px;
    padding: 16px 40px;
    font-size: 1.2rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(255,107,107,0.4);
    transition: transform 0.15s;
  }
  .restart-btn:active { transform: scale(0.95); }

  /* ─── Sound wave animation ─── */
  .speak-btn {
    position: absolute;
    bottom: 18px;
    right: 18px;
    background: #F1F3F5;
    border: none;
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .speak-btn:hover { background: #E9ECEF; }
  .speak-btn.speaking { background: #D3F9D8; }

  /* ─── Mobile / small screen fixes ─── */
  @media (max-height: 700px) {
    .deck { height: min(360px, 44vh); }
    .card-emoji { font-size: clamp(2.8rem, 11vw, 4.5rem); }
    .card-chinese { font-size: clamp(2.2rem, 9vw, 4rem); }
    .swipe-hints { margin-top: 10px; }
    .progress-wrap { margin: 4px 0 2px; }
    .score-bar { margin: 4px 0 2px; }
    .lang-strip { padding: 6px 16px 0; }
  }

  @media (max-width: 380px) {
    .logo { font-size: 1.1rem; padding: 5px 12px; }
    .native-select { max-width: 90px; font-size: 0.72rem; }
    .category-btn { font-size: 0.72rem; padding: 5px 8px; }
    .lang-pill { font-size: 0.78rem; padding: 5px 10px; }
    .hint-pill { font-size: 0.78rem; padding: 6px 10px; }
  }

  /* ─── Progress bar ─── */
  .progress-wrap {
    width: min(360px, 88vw);
    margin: 10px 0 4px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    font-weight: 700;
    color: #aaa;
    margin-bottom: 6px;
  }
  .progress-meta .level-label { color: #FF6B6B; }
  .progress-track {
    width: 100%;
    height: 10px;
    background: #F0F0F0;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF6B6B, #FFD43B);
    border-radius: 99px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .progress-fill.level-up {
    background: linear-gradient(90deg, #51CF66, #74C0FC);
  }

  /* ─── Feedback button ─── */
  .feedback-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #fff;
    border: 2px solid #E9ECEF;
    border-radius: 24px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    color: #555;
    z-index: 50;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .feedback-fab:hover { border-color: #FF6B6B; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

  /* ─── Feedback modal ─── */
  .feedback-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 0;
  }
  .feedback-overlay.open { display: flex; }
  .feedback-modal {
    background: #fff;
    border-radius: 28px 28px 0 0;
    padding: 28px 24px 36px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
    animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .feedback-modal h2 { font-size: 1.3rem; font-weight: 900; margin-bottom: 6px; }
  .feedback-modal p  { font-size: 0.9rem; color: #888; margin-bottom: 20px; }

  /* Star rating */
  .star-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .star {
    font-size: 2.2rem;
    cursor: pointer;
    transition: transform 0.15s;
    filter: grayscale(1) opacity(0.35);
  }
  .star.active { filter: none; transform: scale(1.15); }

  /* Comment */
  .feedback-textarea {
    width: 100%;
    border: 2px solid #E9ECEF;
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 1rem;
    font-family: inherit;
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  .feedback-textarea:focus { border-color: #FF6B6B; }

  .feedback-submit {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 14px;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .feedback-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .feedback-success {
    text-align: center;
    padding: 12px 0 4px;
    font-size: 1.1rem;
    font-weight: 700;
    color: #2F9E44;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="lingo">Lingo</span><span class="play">Play</span></div>
  <div style="display:flex; align-items:center; gap:8px;">
    <select class="native-select" id="nativeSelect"></select>
    <button class="category-btn" id="catBtn">🐼 Animals ▾</button>
  </div>
</header>

<!-- Learning language selector -->
<div class="lang-strip" id="langStrip"></div>

<div class="score-bar">
  <div class="score-item">
    <div class="score-dot know"></div>
    <span id="knowCount">0</span> Know it!
  </div>
  <div class="score-item">
    <div class="score-dot practice"></div>
    <span id="practiceCount">0</span> Practice
  </div>
</div>

<!-- Progress bar -->
<div class="progress-wrap">
  <div class="progress-meta">
    <span class="level-label" id="levelLabel">Level 1</span>
    <span id="progressText">0 / 8</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- Category overlay -->
<div class="category-overlay" id="catOverlay">
  <div class="category-box">
    <h2>Pick a Category 🎯</h2>
    <div class="cat-grid" id="catGrid"></div>
  </div>
</div>

<!-- Card deck -->
<div class="deck" id="deck">
  <!-- cards injected by JS -->
</div>

<!-- Swipe hint labels -->
<div class="swipe-hints">
  <div class="hint-pill left">← More practice</div>
  <div class="hint-pill right">Know it! →</div>
</div>

<div class="swipe-continue" id="swipeContinue">
  <span class="arrow-left">👈</span>
  Swipe to continue
  <span class="arrow-right">👉</span>
</div>

<!-- Done screen -->
<div class="done-screen" id="doneScreen">
  <div class="done-emoji">🎉</div>
  <div class="done-title">Great job!</div>
  <div class="done-sub" id="doneSub"></div>
  <button class="restart-btn" id="restartBtn">Play Again 🔄</button>
</div>

<!-- Feedback FAB -->
<button class="feedback-fab" id="feedbackFab">💬 Feedback</button>

<!-- Feedback modal -->
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-modal">
    <h2>Leave Feedback 💬</h2>
    <p>How are you finding the app?</p>
    <div class="star-row" id="starRow">
      <span class="star" data-v="1">⭐</span>
      <span class="star" data-v="2">⭐</span>
      <span class="star" data-v="3">⭐</span>
      <span class="star" data-v="4">⭐</span>
      <span class="star" data-v="5">⭐</span>
    </div>
    <textarea class="feedback-textarea" id="feedbackComment" placeholder="Any thoughts? (optional)"></textarea>
    <button class="feedback-submit" id="feedbackSubmit" disabled>Send Feedback</button>
    <div class="feedback-success" id="feedbackSuccess">✅ Thanks for your feedback!</div>
  </div>
</div>

<!-- Confetti container -->
<div class="celebrate" id="celebrate"></div>

<script>
const LANGUAGES = {
  zh: { name: 'Chinese',  flag: '🇨🇳', locale: 'zh-CN', label: '中文' },
  ja: { name: 'Japanese', flag: '🇯🇵', locale: 'ja-JP', label: '日本語' },
  it: { name: 'Italian',  flag: '🇮🇹', locale: 'it-IT', label: 'Italiano' },
  es: { name: 'Spanish',  flag: '🇪🇸', locale: 'es-ES', label: 'Español' },
  en: { name: 'English',  flag: '🇬🇧', locale: 'en-GB', label: 'English' },
  ru: { name: 'Russian',  flag: '🇷🇺', locale: 'ru-RU', label: 'Русский' },
  hi: { name: 'Hindi',    flag: '🇮🇳', locale: 'hi-IN', label: 'हिन्दी' },
  pt: { name: 'Portuguese', flag: '🇵🇹', locale: 'pt-BR', label: 'Português' },
  si: { name: 'Sinhala',    flag: '🇱🇰', locale: 'si-LK', label: 'සිංහල' },
};

const CATEGORIES = {
  animals: {
    label: '🐼 Animals', emoji: '🐼',
    cards: [
      { en:'Cat',    emoji:'🐱', zh:{w:'猫',r:'māo'},     ja:{w:'ねこ',r:'neko'},       it:{w:'gatto'}, es:{w:'gato'},      pt:{w:'gato'},     ru:{w:'кошка',r:'koshka'},   hi:{w:'बिल्ली',r:'billi'},  si:{w:'බළලා',r:'balala'} },
      { en:'Dog',    emoji:'🐶', zh:{w:'狗',r:'gǒu'},     ja:{w:'いぬ',r:'inu'},        it:{w:'cane'},  es:{w:'perro'},     pt:{w:'cachorro'}, ru:{w:'собака',r:'sobaka'},  hi:{w:'कुत्ता',r:'kutta'},  si:{w:'බල්ලා',r:'balla'} },

// ─── State ───────────────────────────────────────────
let currentLang = 'zh';
let currentNative = 'en';
let currentCat = 'animals';

// ─── Helpers ─────────────────────────────────────────
function getLangWord(card, lang) {
  if (lang === 'en') return { w: card.en, r: '' };
  return card[lang] || { w: card.en, r: '' };
}
function getNativeWord(card) {
  if (currentNative === 'en') return card.en;
  return (card[currentNative] && card[currentNative].w) || card.en;
}
let queue = [];
let knowCount = 0;
let practiceCount = 0;
const CARDS_PER_LEVEL = 8;
let totalSwiped = 0;
let currentLevel = 1;
let topCard = null;
let revealed = false;

// drag state
let dragStartX = 0, dragStartY = 0;
let dragging = false;
let currentX = 0;

// ─── Speak ───────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = LANGUAGES[currentLang].locale;
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

nativeSelect.onchange = () => {
  currentNative = nativeSelect.value;

};

// ─── Build language picker ────────────────────────────
const langStrip = document.getElementById('langStrip');
Object.entries(LANGUAGES).forEach(([key, lang]) => {
  const pill = document.createElement('button');
  pill.className = 'lang-pill' + (key === currentLang ? ' active' : '');
  pill.innerHTML = `${lang.flag} ${lang.name}`;

requestAnimationFrame(() => {

  if (active) active.scrollIntoView({ block: 'nearest', inline: 'nearest' });

const catGrid = document.getElementById('catGrid');
Object.entries(CATEGORIES).forEach(([key, cat]) => {

document.getElementById('catOverlay').onclick = (e) => {

    document.getElementById('catOverlay').classList.remove('open');

function selectCategory(key) {
  currentCat = key;
  document.querySelectorAll('.cat-item').forEach((el, i) => {
    el.classList.toggle('active', Object.keys(CATEGORIES)[i] === key);
  });
  document.getElementById('catBtn').textContent = CATEGORIES[key].label + ' ▾';
  document.getElementById('catOverlay').classList.remove('open');
  startDeck();
}

// ─── Build deck ──────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startDeck() {
  knowCount = 0; practiceCount = 0; totalSwiped = 0; currentLevel = 1;
  document.getElementById('knowCount').textContent = 0;
  document.getElementById('practiceCount').textContent = 0;
  updateProgress();
  queue = shuffle(CATEGORIES[currentCat].cards);

  document.getElementById('doneScreen').classList.remove('show');
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  deck.style.display = '';

  // render top 3 visually
  renderCards();
}

function renderCards() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  revealed = false;
  document.getElementById('swipeContinue').classList.remove('show');

  const visible = queue.slice(0, 3);
  visible.reverse().forEach((card, i) => {
    const isTop = i === visible.length - 1;
    const el = createCardEl(card, isTop);
    deck.appendChild(el);
  });

  topCard = deck.querySelector('.card.top');
  if (topCard) attachDrag(topCard);
}

function createCardEl(card, isTop) {
  const lang = getLangWord(card, currentLang);
  const word = lang.w;
  const rom  = lang.r || '';

  const el = document.createElement('div');
  el.className = 'card' + (isTop ? ' top' : '');
  el.innerHTML = `
    <div class="swipe-label know">Know it! ✅</div>
    <div class="swipe-label practice">Practice 🔄</div>
    <div class="card-emoji">${card.emoji}</div>
    <div class="card-chinese">${word}</div>
    <div class="card-pinyin">${rom}</div>
    <div class="card-english">${getNativeWord(card)}</div>
    <div class="tap-hint">👆 Tap to reveal</div>
    <button class="speak-btn" title="Hear it">🔊</button>
  `;

  if (isTop) {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('speak-btn')) {
        speak(word);
        e.target.classList.add('speaking');
        setTimeout(() => e.target.classList.remove('speaking'), 1200);
        return;
      }
      if (Math.abs(currentX) > 5) return;
      if (!revealed) {
        el.classList.add('revealed');
        revealed = true;
        speak(word);
        document.getElementById('swipeContinue').classList.add('show');
      }
    });
  }
  return el;
}

// ─── Drag / swipe ────────────────────────────────────
function attachDrag(el) {
  // mouse
  el.addEventListener('mousedown', onStart);
  // touch
  el.addEventListener('touchstart', onStart, { passive: true });
}

function onStart(e) {
  if (!revealed) return;
  dragging = true;
  currentX = 0;
  const pt = e.touches ? e.touches[0] : e;
  dragStartX = pt.clientX;
  dragStartY = pt.clientY;

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

function onMove(e) {
  if (!dragging) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - dragStartX;
  const currentY = pt.clientY - dragStartY;
  const rotate = currentX * 0.08;

  topCard.style.transform = `translate(${currentX}px, ${currentY * 0.3}px) rotate(${rotate}deg)`;
  topCard.style.transition = 'none';

  // show labels + tint card background
  const ratio = Math.min(Math.abs(currentX) / 80, 1);
  topCard.querySelector('.swipe-label.know').style.opacity = currentX > 0 ? ratio : 0;
  topCard.querySelector('.swipe-label.practice').style.opacity = currentX < 0 ? ratio : 0;

  if (currentX > 0) {
    topCard.style.background = `rgba(81, 207, 102, ${ratio * 0.25})`;
  } else if (currentX < 0) {
    topCard.style.background = `rgba(255, 107, 107, ${ratio * 0.25})`;
  } else {
    topCard.style.background = '';
  }
}

function onEnd() {
  if (!dragging) return;
  dragging = false;
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('mouseup', onEnd);
  document.removeEventListener('touchmove', onMove);
  document.removeEventListener('touchend', onEnd);

  const threshold = 80;
  if (currentX > threshold) {
    flyOut('right');
  } else if (currentX < -threshold) {
    flyOut('left');
  } else {
    // snap back
    topCard.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s';
    topCard.style.transform = '';
    topCard.style.background = '';
    topCard.querySelector('.swipe-label.know').style.opacity = 0;
    topCard.querySelector('.swipe-label.practice').style.opacity = 0;
  }
  currentX = 0;
}

function flyOut(dir) {
  const x = dir === 'right' ? window.innerWidth * 1.5 : -window.innerWidth * 1.5;
  topCard.style.transition = 'transform 0.5s ease-in, opacity 0.5s';
  topCard.style.transform = `translate(${x}px, -80px) rotate(${dir === 'right' ? 30 : -30}deg)`;
  topCard.style.opacity = '0';

  if (dir === 'right') {
    knowCount++;
    document.getElementById('knowCount').textContent = knowCount;
    confetti();
  } else {
    practiceCount++;
    document.getElementById('practiceCount').textContent = practiceCount;
  }

  totalSwiped++;
  updateProgress();
  queue.shift();

  setTimeout(() => {
    if (queue.length === 0) {
      showDone();
    } else {
      renderCards();
    }
  }, 420);
}

// ─── Done screen ─────────────────────────────────────
function showDone() {
  document.getElementById('deck').style.display = 'none';
  const done = document.getElementById('doneScreen');
  done.classList.add('show');
  const total = knowCount + practiceCount;
  document.getElementById('doneSub').textContent =
    `You knew ${knowCount} out of ${total} words! ${knowCount === total ? '🌟 Perfect!' : '💪 Keep going!'}`;
  confetti(80);
}

document.getElementById('restartBtn').onclick = startDeck;

// ─── Confetti ────────────────────────────────────────
function confetti(count = 30) {
  const el = document.getElementById('celebrate');
  el.innerHTML = '';
  const colors = ['#FF6B6B','#FFD43B','#51CF66','#74C0FC','#F783AC','#FF922B'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-delay: ${Math.random() * 0.6}s;
      animation-duration: ${0.9 + Math.random() * 0.8}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      transform: rotate(${Math.random() * 360}deg);
    `;
    el.appendChild(p);
  }
  setTimeout(() => { el.innerHTML = ''; }, 2000);
}

// ─── Progress bar ─────────────────────────────────────
function updateProgress() {
  const posInLevel = totalSwiped % CARDS_PER_LEVEL;
  const newLevel = Math.floor(totalSwiped / CARDS_PER_LEVEL) + 1;
  const pct = (posInLevel / CARDS_PER_LEVEL) * 100;

  const fill = document.getElementById('progressFill');
  const label = document.getElementById('levelLabel');
  const text = document.getElementById('progressText');

  if (newLevel > currentLevel) {
    // Level-up flash animation
    currentLevel = newLevel;
    fill.classList.add('level-up');
    fill.style.width = '100%';
    setTimeout(() => {
      fill.style.transition = 'none';
      fill.style.width = '0%';
      fill.classList.remove('level-up');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        fill.style.transition = 'width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        fill.style.width = pct + '%';
      }));
    }, 600);
  } else {
    fill.style.width = pct + '%';
  }

  label.textContent = `Level ${currentLevel}`;
  text.textContent = `${posInLevel} / ${CARDS_PER_LEVEL}`;
}

// ─── Init ─────────────────────────────────────────────
startDeck();

// ─── Feedback ─────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://formspree.io/f/xvzwldza';

let selectedRating = 0;

document.getElementById('feedbackFab').onclick = () => {
  selectedRating = 0;
  document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
  document.getElementById('feedbackComment').value = '';
  document.getElementById('feedbackSubmit').disabled = true;
  document.getElementById('feedbackSuccess').style.display = 'none';
  document.getElementById('feedbackOverlay').classList.add('open');
};

document.getElementById('feedbackOverlay').onclick = (e) => {
  if (e.target === document.getElementById('feedbackOverlay'))
    document.getElementById('feedbackOverlay').classList.remove('open');
};

document.getElementById('starRow').onclick = (e) => {
  const star = e.target.closest('.star');
  if (!star) return;
  selectedRating = parseInt(star.dataset.v);
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.v) <= selectedRating);
  });
  document.getElementById('feedbackSubmit').disabled = false;
};

document.getElementById('feedbackSubmit').onclick = async () => {
  const btn = document.getElementById('feedbackSubmit');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const payload = {
    rating: selectedRating,
    comment: document.getElementById('feedbackComment').value.trim()
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch (_) {}

  btn.textContent = 'Send Feedback';
  document.getElementById('feedbackSuccess').style.display = 'block';
  setTimeout(() => document.getElementById('feedbackOverlay').classList.remove('open'), 1800);
};
</script>
